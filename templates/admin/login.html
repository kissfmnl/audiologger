<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin login — AudioLogger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        page: '#f1f5f9',
                        heading: '#0f172a',
                        body: '#334155',
                        muted: '#64748b',
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        };
    </script>
</head>
<body class="bg-page text-body min-h-screen flex items-center justify-center px-4 text-sm">
    <div class="w-full max-w-sm">
        <div class="mb-6 text-center">
            <p class="text-xs font-semibold text-heading uppercase tracking-widest mb-2">ferryoomen</p>
            <h1 class="text-lg font-semibold text-heading">AudioLogger Admin</h1>
            <p class="text-muted text-xs mt-1">Inloggen om zenders te beheren</p>
        </div>

        <form method="post" action="/admin/login" class="bg-white border border-slate-200 p-6 space-y-4">
            {% if error %}
            <div class="border border-red-200 bg-red-50 text-red-700 text-xs px-3 py-2">
                {{ error }}
            </div>
            {% endif %}

            <div>
                <label for="username" class="block text-xs font-medium text-body mb-1.5">Gebruikersnaam</label>
                <input type="text" id="username" name="username" required autocomplete="username"
                       class="w-full bg-white border border-slate-300 rounded px-3 py-2 text-sm text-heading focus:outline-none focus:border-slate-500 focus:ring-1 focus:ring-slate-500">
            </div>

            <div>
                <label for="password" class="block text-xs font-medium text-body mb-1.5">Wachtwoord</label>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                       class="w-full bg-white border border-slate-300 rounded px-3 py-2 text-sm text-heading focus:outline-none focus:border-slate-500 focus:ring-1 focus:ring-slate-500">
            </div>

            <button type="submit"
                    class="w-full py-2 bg-slate-800 text-white text-sm font-medium hover:bg-slate-900 transition border border-slate-800">
                Inloggen
            </button>
        </form>

        <p class="text-center mt-5">
            <a href="/" class="text-xs text-muted hover:text-heading transition">← Dashboard</a>
        </p>
    </div>
</body>
</html>
