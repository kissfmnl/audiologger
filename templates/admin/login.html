<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin login — AudioLogger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        page: '#f5f3ff',
                        heading: '#1e1b4b',
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        };
    </script>
</head>
<body class="bg-page text-slate-600 min-h-screen flex items-center justify-center px-4 text-sm">
    <div class="w-full max-w-sm">
        <div class="mb-6 text-center">
            <p class="text-xs font-bold text-violet-600 mb-2">ferryoomen</p>
            <h1 class="text-xl font-bold text-heading">AudioLogger Admin</h1>
            <p class="text-slate-500 text-xs mt-1">Inloggen om zenders te beheren</p>
        </div>

        <form method="post" action="/admin/login" class="bg-white border border-violet-100 rounded-xl p-6 space-y-4 shadow-lg shadow-violet-100/50">
            {% if error %}
            <div class="border border-red-200 bg-red-50 text-red-700 text-xs px-3 py-2 rounded-lg">
                {{ error }}
            </div>
            {% endif %}

            <div>
                <label for="username" class="block text-xs font-semibold text-violet-500 uppercase tracking-wide mb-1.5">Gebruikersnaam</label>
                <input type="text" id="username" name="username" required autocomplete="username"
                       class="w-full bg-white border border-violet-200 rounded-lg px-3 py-2.5 text-sm text-heading focus:outline-none focus:border-violet-400 focus:ring-2 focus:ring-violet-200">
            </div>

            <div>
                <label for="password" class="block text-xs font-semibold text-violet-500 uppercase tracking-wide mb-1.5">Wachtwoord</label>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                       class="w-full bg-white border border-violet-200 rounded-lg px-3 py-2.5 text-sm text-heading focus:outline-none focus:border-violet-400 focus:ring-2 focus:ring-violet-200">
            </div>

            <button type="submit"
                    class="w-full py-2.5 rounded-lg text-white text-sm font-semibold transition hover:-translate-y-0.5"
                    style="background: linear-gradient(135deg, #7c3aed 0%, #6366f1 100%); box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);">
                Inloggen
            </button>
        </form>

        <p class="text-center mt-5">
            <a href="/" class="text-xs text-violet-400 hover:text-violet-600 transition">← Dashboard</a>
        </p>
    </div>
</body>
</html>
