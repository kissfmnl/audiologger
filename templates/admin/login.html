<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin login — AudioLogger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        page: '#EEF1F6',
                        heading: '#111827',
                        body: '#374151',
                        muted: '#6B7280',
                        faint: '#9CA3AF',
                        purple: { 100: '#EDE9FE', 600: '#7C3AED', 700: '#6D28D9' },
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        };
    </script>
</head>
<body class="bg-page text-body min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <p class="text-lg font-semibold text-heading mb-1">ferryoomen</p>
            <h1 class="text-2xl font-bold text-heading">AudioLogger Admin</h1>
            <p class="text-muted text-sm mt-2">Log in om zenders te beheren</p>
        </div>

        <form method="post" action="/admin/login" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 space-y-5">
            {% if error %}
            <div class="bg-red-50 border border-red-100 text-red-600 text-sm rounded-xl px-4 py-3">
                {{ error }}
            </div>
            {% endif %}

            <div>
                <label for="username" class="block text-sm font-medium text-body mb-2">Gebruikersnaam</label>
                <input type="text" id="username" name="username" required autocomplete="username"
                       class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-heading focus:outline-none focus:ring-2 focus:ring-purple-100 focus:border-purple-600">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-body mb-2">Wachtwoord</label>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                       class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-heading focus:outline-none focus:ring-2 focus:ring-purple-100 focus:border-purple-600">
            </div>

            <button type="submit"
                    class="w-full py-3 rounded-xl bg-purple-600 text-white font-semibold hover:bg-purple-700 transition shadow-sm">
                Inloggen
            </button>
        </form>

        <p class="text-center mt-6">
            <a href="/" class="text-sm text-muted hover:text-purple-600 transition">← Terug naar dashboard</a>
        </p>
    </div>
</body>
</html>
