<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin login — AudioLogger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f0f0f',
                        card: '#1a1a1a',
                        accent: '#00d4aa',
                        muted: '#888888',
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        };
    </script>
</head>
<body class="bg-dark text-white min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold">AudioLogger Admin</h1>
            <p class="text-muted text-sm mt-2">Log in om zenders te beheren</p>
        </div>

        <form method="post" action="/admin/login" class="bg-card border border-white/10 rounded-xl p-8 space-y-5">
            {% if error %}
            <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-lg px-4 py-3">
                {{ error }}
            </div>
            {% endif %}

            <div>
                <label for="username" class="block text-sm text-muted mb-2">Gebruikersnaam</label>
                <input type="text" id="username" name="username" required autocomplete="username"
                       class="w-full bg-dark border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-accent">
            </div>

            <div>
                <label for="password" class="block text-sm text-muted mb-2">Wachtwoord</label>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                       class="w-full bg-dark border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-accent">
            </div>

            <button type="submit"
                    class="w-full py-3 rounded-lg bg-accent text-dark font-semibold hover:bg-accent/90 transition">
                Inloggen
            </button>
        </form>

        <p class="text-center mt-6">
            <a href="/" class="text-sm text-muted hover:text-accent transition">← Terug naar dashboard</a>
        </p>
    </div>
</body>
</html>
