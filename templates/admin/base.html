<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin — AudioLogger{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        page: '#f1f5f9',
                        sidebar: '#ffffff',
                        surface: '#ffffff',
                        heading: '#0f172a',
                        body: '#334155',
                        muted: '#64748b',
                        faint: '#94a3b8',
                        accent: {
                            DEFAULT: '#1e293b',
                            light: '#f1f5f9',
                            muted: '#475569',
                            border: '#cbd5e1',
                        },
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    borderRadius: {
                        DEFAULT: '0.25rem',
                        md: '0.375rem',
                    },
                },
            },
        };
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-page text-body min-h-screen text-sm">
    <div class="flex min-h-screen">
        <aside class="hidden lg:flex w-56 shrink-0 flex-col bg-sidebar border-r border-slate-200 px-3 py-5">
            <div class="px-2 mb-6">
                <a href="/admin" class="text-sm font-semibold text-heading tracking-tight uppercase letter-spacing-wide">ferryoomen</a>
            </div>

            <nav class="flex-1 space-y-5 overflow-y-auto">
                <div>
                    <p class="px-2 mb-1.5 text-[10px] font-semibold uppercase tracking-widest text-faint">Radio</p>
                    <ul class="space-y-0.5">
                        <li>
                            <button type="button" data-scroll-target="section-stations"
                                    class="nav-item w-full flex items-center gap-2.5 px-2 py-2 rounded text-sm font-medium transition text-left
                                    {% if active_nav == 'stations' %}bg-accent-light text-heading border border-slate-200{% else %}text-body hover:bg-slate-50 border border-transparent{% endif %}">
                                <svg class="w-4 h-4 shrink-0 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
                                </svg>
                                Zenders
                            </button>
                        </li>
                    </ul>
                </div>

                <div>
                    <p class="px-2 mb-1.5 text-[10px] font-semibold uppercase tracking-widest text-faint">Archief</p>
                    <ul class="space-y-0.5">
                        <li>
                            <a href="/"
                               class="flex items-center gap-2.5 px-2 py-2 rounded text-sm font-medium text-body hover:bg-slate-50 transition border border-transparent">
                                <svg class="w-4 h-4 shrink-0 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                                </svg>
                                Dashboard
                            </a>
                        </li>
                    </ul>
                </div>

                <div>
                    <p class="px-2 mb-1.5 text-[10px] font-semibold uppercase tracking-widest text-faint">Systeem</p>
                    <form method="post" action="/admin/logout">
                        <button type="submit"
                                class="w-full flex items-center gap-2.5 px-2 py-2 rounded text-sm font-medium text-body hover:bg-slate-50 transition text-left border border-transparent">
                            <svg class="w-4 h-4 shrink-0 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                            </svg>
                            Uitloggen
                        </button>
                    </form>
                </div>
            </nav>
        </aside>

        <div class="flex-1 min-w-0">
            <header class="lg:hidden bg-sidebar border-b border-slate-200 px-4 py-3 flex items-center justify-between">
                <span class="text-sm font-semibold text-heading uppercase">ferryoomen</span>
                <a href="/" class="text-xs text-muted hover:text-heading font-medium">Dashboard</a>
            </header>

            <main class="px-4 sm:px-6 lg:px-8 py-5 sm:py-6 max-w-[1400px]">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
