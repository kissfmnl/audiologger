<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin — AudioLogger{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        page: '#f5f3ff',
                        sidebar: '#f8fafc',
                        surface: '#ffffff',
                        heading: '#1e1b4b',
                        body: '#4338ca',
                        muted: '#6366f1',
                        faint: '#a5b4fc',
                        accent: {
                            DEFAULT: '#7c3aed',
                            light: '#ede9fe',
                            soft: '#f5f3ff',
                            muted: '#6d28d9',
                            border: '#c4b5fd',
                        },
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    borderRadius: {
                        DEFAULT: '0.5rem',
                        lg: '0.75rem',
                        xl: '1rem',
                    },
                    boxShadow: {
                        card: '0 1px 3px rgba(124, 58, 237, 0.08), 0 4px 12px rgba(124, 58, 237, 0.06)',
                    },
                },
            },
        };
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-page text-slate-700 min-h-screen text-sm">
    <div class="flex min-h-screen">
        <aside class="hidden lg:flex w-56 shrink-0 flex-col bg-sidebar border-r border-violet-100 px-3 py-5">
            <div class="px-2 mb-6">
                <a href="/admin" class="text-sm font-bold text-heading tracking-tight">ferryoomen</a>
                <p class="text-[10px] text-violet-400 mt-0.5 font-medium">AudioLogger</p>
            </div>

            <nav class="flex-1 space-y-5 overflow-y-auto">
                <div>
                    <p class="px-2 mb-1.5 text-[10px] font-semibold uppercase tracking-widest text-violet-300">Radio</p>
                    <ul class="space-y-0.5">
                        <li>
                            <a href="/admin/logging"
                               class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm font-medium transition border
                               {% if active_nav == 'logging' %}bg-accent-light text-accent-muted border-accent-border{% else %}text-slate-600 hover:bg-violet-50 border-transparent{% endif %}">
                                <svg class="w-4 h-4 shrink-0 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                                Opname-status
                            </a>
                        </li>
                        <li>
                            <a href="/admin#section-add"
                               class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-violet-50 transition border border-transparent">
                                <span class="w-5 h-5 rounded-md bg-emerald-100 text-emerald-600 flex items-center justify-center text-xs font-bold">+</span>
                                Toevoegen
                            </a>
                        </li>
                        <li>
                            <a href="/admin#section-stations"
                               class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm font-medium transition border
                               {% if active_nav == 'stations' %}bg-accent-light text-accent-muted border-accent-border{% else %}text-slate-600 hover:bg-violet-50 border-transparent{% endif %}">
                                <svg class="w-4 h-4 shrink-0 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
                                </svg>
                                Zenders
                            </a>
                        </li>
                    </ul>
                </div>

                <div>
                    <p class="px-2 mb-1.5 text-[10px] font-semibold uppercase tracking-widest text-violet-300">Archief</p>
                    <ul class="space-y-0.5">
                        <li>
                            <a href="/"
                               class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-violet-50 transition border border-transparent">
                                <svg class="w-4 h-4 shrink-0 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                                </svg>
                                Dashboard
                            </a>
                        </li>
                    </ul>
                </div>

                <div>
                    <p class="px-2 mb-1.5 text-[10px] font-semibold uppercase tracking-widest text-violet-300">Systeem</p>
                    <form method="post" action="/admin/logout">
                        <button type="submit"
                                class="w-full flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-violet-50 transition text-left border border-transparent">
                            <svg class="w-4 h-4 shrink-0 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                            </svg>
                            Uitloggen
                        </button>
                    </form>
                </div>
            </nav>
        </aside>

        <div class="flex-1 min-w-0">
            <header class="lg:hidden bg-slate-50 border-b border-violet-100 px-4 py-3 flex items-center justify-between">
                <span class="text-sm font-bold text-heading">ferryoomen</span>
                <a href="/" class="text-xs text-violet-500 hover:text-accent font-medium">Dashboard</a>
            </header>

            <main class="px-4 sm:px-6 lg:px-8 py-5 sm:py-6 max-w-[960px]">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
