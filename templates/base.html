<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AudioLogger{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        page: '#EEF1F6',
                        sidebar: '#F3F4F6',
                        surface: '#F3F4F6',
                        heading: '#111827',
                        body: '#374151',
                        muted: '#6B7280',
                        faint: '#9CA3AF',
                        purple: {
                            50: '#F5F3FF',
                            100: '#EDE9FE',
                            600: '#7C3AED',
                            700: '#6D28D9',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        card: '0 1px 3px 0 rgb(0 0 0 / 0.06), 0 1px 2px -1px rgb(0 0 0 / 0.06)',
                    },
                },
            },
        };
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        img.station-logo {
            -webkit-user-drag: none;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: none;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-page text-body min-h-screen">
    {% set site = request.state.site %}
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-gray-200/80 mt-16 py-6 bg-surface">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-muted space-y-1">
            <p>{{ site.footer_text }}</p>
            {% if site.footer_link_url and site.footer_link_label %}
            <p>
                <a href="{{ site.footer_link_url }}" class="text-purple-600 hover:text-purple-700 font-medium">
                    {{ site.footer_link_label }}
                </a>
            </p>
            {% endif %}
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
