<aside class="w-full lg:w-56 xl:w-64 shrink-0">
    <div class="bg-surface rounded-2xl shadow-card border border-gray-100 overflow-hidden lg:sticky lg:top-24">
        <div class="px-3 py-3 border-b border-gray-100">
            <p class="text-[11px] font-semibold uppercase tracking-wide text-muted mb-2 px-1">Land</p>
            <div class="flex flex-wrap gap-1.5">
                <a href="{{ station_url(station.id, selected_date, 'ALL', today=today) }}"
                   class="px-2.5 py-1 rounded-lg text-xs font-medium transition {% if selected_country == 'ALL' %}bg-purple-600 text-white{% else %}bg-gray-100 text-body hover:bg-gray-200{% endif %}">
                    Alle
                </a>
                {% for c in countries %}
                <a href="{{ station_url(station.id, selected_date, c, today=today) }}"
                   class="px-2.5 py-1 rounded-lg text-xs font-medium transition {% if selected_country == c %}bg-purple-600 text-white{% else %}bg-gray-100 text-body hover:bg-gray-200{% endif %}">
                    {{ c }}
                </a>
                {% endfor %}
            </div>
        </div>

        <nav class="p-2 max-h-[calc(100vh-14rem)] overflow-y-auto">
            {% for s in stations %}
            <a href="{{ station_url(s.id, selected_date, selected_country, today=today) }}"
               class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-medium transition mb-0.5 min-w-0
                      {% if s.id == station.id %}bg-purple-600 text-white shadow-sm{% else %}text-body hover:bg-gray-100{% endif %}">
                {% if s.logo_url %}
                <img src="{{ s.logo_url }}" alt=""
                     class="station-logo w-7 h-7 rounded-lg object-cover border shrink-0
                            {% if s.id == station.id %}border-white/30 bg-white/10{% else %}border-gray-200 bg-gray-100{% endif %}"
                     draggable="false" oncontextmenu="return false">
                {% else %}
                <span class="w-7 h-7 flex items-center justify-center text-base shrink-0">{{ s.flag }}</span>
                {% endif %}
                <span class="truncate">{{ s.name }}</span>
            </a>
            {% else %}
            <p class="px-3 py-4 text-sm text-muted">Geen zenders voor dit filter</p>
            {% endfor %}
        </nav>
    </div>
</aside>
